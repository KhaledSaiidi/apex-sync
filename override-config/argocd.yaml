## Argo CD runtime and repo-server plugin settings.
argocd_reconciliation_timeout: "180s" # How often Argo CD checks applications for drift.
argocd_repo_server_timeout_secs: "300" # Repo-server request timeout for manifest generation.
argocd_exec_timeout: "180s" # Maximum runtime for Argo CD plugin commands.
argocd_server_service_type: "LoadBalancer"
argocd_cmp_image: "ghcr.io/khaledsaiidi/apex-sync/argocd-cmp-envsubst:1.3.1"
