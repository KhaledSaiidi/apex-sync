## Observability runtime configuration:
observability_grafana_datasource_time_interval: "1m"
observability_grafana_datasource_resync_period: "10m0s"
observability_grafana_loki_timeout: "60"
observability_grafana_tempo_trace_start_time_shift: "-1h"
observability_grafana_tempo_trace_end_time_shift: "1h"

observability_alloy_log_level: "info"
observability_alloy_log_format: "logfmt"
observability_alloy_gateway_batch_timeout: "5s"
observability_alloy_gateway_batch_send_size: "8192"
observability_alloy_node_scrape_interval: "30s"
observability_alloy_service_monitor_interval: "30s"
observability_alloy_events_log_format: "logfmt"

observability_loki_schema_period: "24h"
observability_loki_replication_factor: "3"
observability_loki_retention_period: "30d"
observability_loki_ingestion_rate_mb: "32"
observability_loki_ingestion_burst_size_mb: "64"
observability_loki_max_query_parallelism: "64"
observability_loki_split_queries_by_interval: "15m"

observability_mimir_ingestion_rate: "20000"
observability_mimir_ingestion_burst_size: "400000"
observability_mimir_max_global_series_per_user: "1500000"
observability_mimir_max_query_parallelism: "64"
observability_mimir_max_total_query_length: "12000h"

observability_tempo_trace_idle_period: "10s"
observability_tempo_ingester_replication_factor: "3"
observability_tempo_max_block_bytes: "1073741824"
observability_tempo_max_block_duration: "30m"
observability_tempo_complete_block_timeout: "15m"

observability_grafana_operator_revision_history_limit: "3"
observability_grafana_operator_default_resync_period: "10m"
observability_grafana_operator_max_concurrent_reconciles: "2"
observability_grafana_operator_log_encoder: "json"
observability_grafana_operator_log_level: "info"
observability_grafana_operator_log_time: "rfc3339"
observability_grafana_operator_kube_auth_expiration_seconds: "3600"
observability_grafana_operator_service_monitor_interval: "1m"
observability_grafana_operator_service_monitor_scrape_timeout: "10s"

observability_opentelemetry_operator_revision_history_limit: "3"
observability_opentelemetry_operator_min_ready_seconds: "10"
observability_opentelemetry_operator_prometheus_rule_duration: "5m"
observability_opentelemetry_operator_webhook_timeout_seconds: "10"
