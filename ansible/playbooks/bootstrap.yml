---
- name: One-time bootstrap from localhost
  hosts: localhost
  gather_facts: true
  become: true

  pre_tasks:
    - name: Assert required keys exist (from -e @vars)
      ansible.builtin.assert:
        that:
          - cluster is defined
          - cluster.kubeconfig is defined
          - cluster.kubeconfig.local_path is defined
          - cluster.name is defined
        fail_msg: >
          Missing required keys in vars (-e @ansible-vars.yaml).
          Required:
            cluster.kubeconfig.local_path,
            cluster.name,

    - name: Normalize commonly used vars
      ansible.builtin.set_fact:
        kubeconfig_local_path: "{{ cluster.kubeconfig.local_path }}"
        kubectl_version: "v1.34.1"
        helm_version: "v3.19.0"
        tooling_os: "{{ ansible_system | lower }}"
        tooling_arch: "{{ tooling_arch_map[ansible_architecture] | default('') }}"
        tooling_arch_map:
          x86_64: amd64
          amd64: amd64
          aarch64: arm64
          arm64: arm64

    - name: Assert bootstrap architecture is supported
      ansible.builtin.assert:
        that:
          - tooling_arch | length > 0
        fail_msg: "Unsupported bootstrap architecture {{ ansible_architecture }} for kubectl/helm downloads."

    - name: Check kubeconfig file exists on the bootstrap host
      ansible.builtin.stat:
        path: "{{ kubeconfig_local_path }}"
      register: kubeconfig_local_stat

    - name: Assert kubeconfig file exists
      ansible.builtin.assert:
        that:
          - kubeconfig_local_stat.stat.exists
          - kubeconfig_local_stat.stat.isreg
        fail_msg: "Kubeconfig file not found at {{ kubeconfig_local_path }}."

    - name: Check installed kubectl version
      ansible.builtin.command:
        cmd: kubectl version --client=true -o json
      register: kubectl_version_check
      changed_when: false
      failed_when: false

    - name: Install kubectl
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/{{ tooling_os }}/{{ tooling_arch }}/kubectl"
        dest: /usr/local/bin/kubectl
        mode: "0755"
      when: >
        (kubectl_version_check.rc | default(1)) != 0 or
        ((kubectl_version_check.stdout | default('{}') | from_json).clientVersion.gitVersion | default('')) != kubectl_version

    - name: Check installed helm version
      ansible.builtin.command:
        cmd: helm version --template {{ "'{{ .Version }}'" }}
      register: helm_version_check
      changed_when: false
      failed_when: false

    - name: Create temporary directory for Helm download
      ansible.builtin.tempfile:
        state: directory
        suffix: helm-download
      register: helm_download_dir
      when: >
        (helm_version_check.rc | default(1)) != 0 or
        ((helm_version_check.stdout | default('') | regex_search('v[0-9]+\\.[0-9]+\\.[0-9]+') | default('')) != helm_version)

    - name: Download Helm archive
      ansible.builtin.get_url:
        url: "https://get.helm.sh/helm-{{ helm_version }}-{{ tooling_os }}-{{ tooling_arch }}.tar.gz"
        dest: "{{ helm_download_dir.path }}/helm.tar.gz"
        mode: "0644"
      when: helm_download_dir is defined and helm_download_dir.path is defined

    - name: Extract Helm archive
      ansible.builtin.unarchive:
        src: "{{ helm_download_dir.path }}/helm.tar.gz"
        dest: "{{ helm_download_dir.path }}"
        remote_src: true
      when: helm_download_dir is defined and helm_download_dir.path is defined

    - name: Install Helm
      ansible.builtin.copy:
        src: "{{ helm_download_dir.path }}/{{ tooling_os }}-{{ tooling_arch }}/helm"
        dest: /usr/local/bin/helm
        mode: "0755"
        remote_src: true
      when: helm_download_dir is defined and helm_download_dir.path is defined

    - name: Remove temporary Helm download directory
      ansible.builtin.file:
        path: "{{ helm_download_dir.path }}"
        state: absent
      when: helm_download_dir is defined and helm_download_dir.path is defined

  tasks:
    - name: Install Argocd
      ansible.builtin.import_role:
        name: argocd
    - name: Bootstrap Argo CD root application
      ansible.builtin.import_role:
        name: gitops_root_app
