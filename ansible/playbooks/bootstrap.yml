---
- name: One-time bootstrap from localhost
  hosts: localhost
  gather_facts: true

  vars:
    kubeconfig_local_path: "{{ cluster.kubeconfig.local_path }}"

  pre_tasks:
    - name: Assert required keys exist (from -e @vars)
      ansible.builtin.assert:
        that:
          - cluster is defined
          - cluster.kubeconfig is defined
          - artifacts is defined
          - artifacts.argocd_values_local_path is defined
          - artifacts.gitops_root_app_manifest_local_path is defined
          - github is defined
          - github.gitops_root_app_repo_url is defined
          - github.github_app_id is defined
          - github.github_app_installation_id is defined
          - github.github_app_private_key is defined
          - aws.access_key_id is defined
          - aws.secret_access_key is defined
          - argocd.argocd_chart_version is defined
        fail_msg: >
          Missing required keys in vars (-e @ansible-vars.yaml).
          Required:
            artifacts.argocd_values_local_path.
            artifacts.gitops_root_app_manifest_local_path.
            github.gitops_root_app_repo_url.
            github.github_app_id.
            github.github_app_installation_id.
            github.github_app_private_key.
            aws.access_key_id.
            aws.secret_access_key.
            argocd.argocd_chart_version.

  tasks:
    - name: Prepare local bootstrap tooling
      ansible.builtin.import_role:
        name: bootstrap_tooling
    - name: Install Cilium
      ansible.builtin.import_role:
        name: cilium_install
    - name: Install Argocd
      ansible.builtin.import_role:
        name: argocd_install
    - name: Bootstrap Argo CD root application
      ansible.builtin.import_role:
        name: gitops_root_app
