---
- name: Create Argo CD GitHub App repository secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: github-app-repository
        namespace: argocd
        labels:
          argocd.argoproj.io/secret-type: repository
      type: Opaque
      stringData:
        url: "{{ gitops_root_app_github_url }}"
        type: git
        githubAppID: "{{ gitops_root_app_github_app_id }}"
        githubAppInstallationID: "{{ gitops_root_app_github_app_installation_id }}"
        githubAppPrivateKey: |-
          {{ gitops_root_app_github_app_private_key }}
  no_log: true

- name: Validate rendered root app manifest path
  ansible.builtin.assert:
    that:
      - gitops_root_app_manifest_local_path | string | length > 0
    fail_msg: "gitops_root_app_manifest_local_path must point to the Terraform-rendered root app manifest."

- name: Check rendered root app manifest on controller
  ansible.builtin.stat:
    path: "{{ gitops_root_app_manifest_local_path }}"
  delegate_to: localhost
  become: false
  register: gitops_root_app_manifest_local_stat

- name: Ensure rendered root app manifest exists
  ansible.builtin.assert:
    that:
      - gitops_root_app_manifest_local_stat.stat.exists
      - gitops_root_app_manifest_local_stat.stat.isreg
    fail_msg: "Rendered root app manifest not found at {{ gitops_root_app_manifest_local_path }}."

- name: Apply Argo CD root application
  ansible.builtin.command:
    cmd: >
      kubectl --kubeconfig "{{ gitops_root_app_kubeconfig }}"
      apply -f "{{ gitops_root_app_manifest_local_path }}"
  register: gitops_root_app_apply
  changed_when: "'created' in (gitops_root_app_apply.stdout | lower) or 'configured' in (gitops_root_app_apply.stdout | lower)"
  failed_when: gitops_root_app_apply.rc != 0

- name: Confirm root application presence
  kubernetes.core.k8s_info:
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: "{{ gitops_root_app_name }}"
    namespace: "{{ gitops_root_app_namespace }}"
    kubeconfig: "{{ gitops_root_app_kubeconfig }}"
  register: gitops_root_app_info
  changed_when: false
  failed_when: (gitops_root_app_info.resources | default([])) | length == 0
