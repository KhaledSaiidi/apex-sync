apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-ui
  namespace: default
data:
  nginx.conf: |
    server {
      listen 5678;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }
    }

  index.html: |
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Kube Forge Demo</title>
      <style>
        :root {
          --bg-1: #0b1020;
          --bg-2: #121a33;
          --card: rgba(255,255,255,0.08);
          --border: rgba(255,255,255,0.14);
          --text: #eef2ff;
          --muted: #b8c1ec;
          --accent: #7c3aed;
          --accent-2: #06b6d4;
          --success: #22c55e;
          --warning: #f59e0b;
          --shadow: 0 20px 60px rgba(0,0,0,0.35);
        }

        * {
          box-sizing: border-box;
        }

        html, body {
          margin: 0;
          padding: 0;
          min-height: 100%;
          font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          color: var(--text);
          background:
            radial-gradient(circle at top left, rgba(124,58,237,0.28), transparent 32%),
            radial-gradient(circle at bottom right, rgba(6,182,212,0.20), transparent 30%),
            linear-gradient(135deg, var(--bg-1), var(--bg-2));
        }

        .page {
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 32px;
        }

        .shell {
          width: 100%;
          max-width: 1180px;
          border: 1px solid var(--border);
          background: rgba(11, 16, 32, 0.72);
          backdrop-filter: blur(14px);
          border-radius: 28px;
          box-shadow: var(--shadow);
          overflow: hidden;
        }

        .topbar {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 18px 24px;
          border-bottom: 1px solid var(--border);
          background: rgba(255,255,255,0.03);
        }

        .brand {
          display: flex;
          align-items: center;
          gap: 12px;
          font-weight: 700;
          letter-spacing: 0.2px;
        }

        .logo {
          width: 14px;
          height: 14px;
          border-radius: 999px;
          background: linear-gradient(135deg, var(--accent), var(--accent-2));
          box-shadow: 0 0 24px rgba(124,58,237,0.8);
        }

        .badge {
          border: 1px solid rgba(34,197,94,0.3);
          color: #d1fae5;
          background: rgba(34,197,94,0.12);
          padding: 8px 12px;
          border-radius: 999px;
          font-size: 13px;
          font-weight: 600;
        }

        .hero {
          display: grid;
          grid-template-columns: 1.2fr 0.8fr;
          gap: 28px;
          padding: 36px;
        }

        .hero-card,
        .panel,
        .metric {
          border: 1px solid var(--border);
          background: var(--card);
          border-radius: 24px;
        }

        .hero-card {
          padding: 34px;
        }

        .eyebrow {
          display: inline-flex;
          align-items: center;
          gap: 8px;
          padding: 8px 12px;
          border-radius: 999px;
          background: rgba(124,58,237,0.14);
          color: #ddd6fe;
          font-size: 13px;
          font-weight: 700;
          margin-bottom: 18px;
        }

        h1 {
          margin: 0 0 14px;
          font-size: clamp(34px, 5vw, 58px);
          line-height: 1.02;
          letter-spacing: -1.4px;
        }

        .sub {
          margin: 0;
          color: var(--muted);
          font-size: 18px;
          line-height: 1.7;
          max-width: 60ch;
        }

        .actions {
          display: flex;
          flex-wrap: wrap;
          gap: 14px;
          margin-top: 28px;
        }

        .btn {
          appearance: none;
          border: 0;
          cursor: pointer;
          padding: 14px 18px;
          border-radius: 16px;
          font-weight: 700;
          font-size: 15px;
          transition: transform 0.18s ease, opacity 0.18s ease;
        }

        .btn:hover {
          transform: translateY(-1px);
        }

        .btn-primary {
          color: white;
          background: linear-gradient(135deg, var(--accent), var(--accent-2));
          box-shadow: 0 12px 28px rgba(124,58,237,0.28);
        }

        .btn-secondary {
          color: var(--text);
          background: rgba(255,255,255,0.06);
          border: 1px solid var(--border);
        }

        .side {
          display: grid;
          gap: 18px;
        }

        .panel {
          padding: 22px;
        }

        .panel h3 {
          margin: 0 0 14px;
          font-size: 18px;
        }

        .stack {
          display: grid;
          gap: 10px;
        }

        .row {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 14px;
          padding: 12px 14px;
          border-radius: 16px;
          background: rgba(255,255,255,0.04);
        }

        .row .k {
          color: var(--muted);
          font-size: 14px;
        }

        .row .v {
          font-weight: 700;
          text-align: right;
        }

        .metrics {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 18px;
          padding: 0 36px 36px;
        }

        .metric {
          padding: 22px;
        }

        .metric .label {
          color: var(--muted);
          font-size: 14px;
          margin-bottom: 10px;
        }

        .metric .value {
          font-size: 30px;
          font-weight: 800;
          letter-spacing: -0.5px;
          margin-bottom: 8px;
        }

        .metric .desc {
          color: var(--muted);
          font-size: 14px;
          line-height: 1.6;
        }

        .footer {
          padding: 0 36px 36px;
        }

        .footer-card {
          border-radius: 24px;
          padding: 22px 24px;
          border: 1px solid var(--border);
          background: rgba(255,255,255,0.05);
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 16px;
          flex-wrap: wrap;
        }

        .footer-card strong {
          display: block;
          margin-bottom: 6px;
          font-size: 16px;
        }

        .footer-card span {
          color: var(--muted);
          font-size: 14px;
        }

        @media (max-width: 960px) {
          .hero {
            grid-template-columns: 1fr;
          }

          .metrics {
            grid-template-columns: 1fr;
          }
        }
      </style>
    </head>
    <body>
      <div class="page">
        <div class="shell">
          <div class="topbar">
            <div class="brand">
              <div class="logo"></div>
              <div>Kube Forge Demo UI</div>
            </div>
            <div class="badge">Live via Istio Gateway API</div>
          </div>

          <section class="hero">
            <div class="hero-card">
              <div class="eyebrow">Kubernetes • Gateway API • TLS Ready</div>
              <h1>Your app is now served through a real UI.</h1>
              <p class="sub">
                This page is being delivered from a Kubernetes Deployment exposed through
                an Istio-managed Gateway API setup, reachable through your domain and ready
                for HTTPS once the certificate is active.
              </p>

              <div class="actions">
                <button class="btn btn-primary" onclick="showStatus()">Check live status</button>
                <button class="btn btn-secondary" onclick="scrollToDetails()">View platform details</button>
              </div>
            </div>

            <div class="side">
              <div class="panel">
                <h3>Runtime</h3>
                <div class="stack">
                  <div class="row">
                    <div class="k">App</div>
                    <div class="v">demo-app</div>
                  </div>
                  <div class="row">
                    <div class="k">Namespace</div>
                    <div class="v">default</div>
                  </div>
                  <div class="row">
                    <div class="k">Gateway</div>
                    <div class="v">main-gateway</div>
                  </div>
                  <div class="row">
                    <div class="k">Ingress domain</div>
                    <div class="v">app.kube-forge.com</div>
                  </div>
                </div>
              </div>

              <div class="panel">
                <h3>Current path</h3>
                <div class="stack">
                  <div class="row">
                    <div class="k">Flow</div>
                    <div class="v">Browser → Gateway → Route → Service → Pod</div>
                  </div>
                  <div class="row">
                    <div class="k">Service port</div>
                    <div class="v">80 → 5678</div>
                  </div>
                  <div class="row">
                    <div class="k">Mode</div>
                    <div class="v">Static UI from ConfigMap</div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section class="metrics" id="details">
            <div class="metric">
              <div class="label">Routing</div>
              <div class="value">Gateway API</div>
              <div class="desc">Requests enter through Istio’s Gateway controller and are matched by your HTTPRoute.</div>
            </div>
            <div class="metric">
              <div class="label">Exposure</div>
              <div class="value">MetalLB</div>
              <div class="desc">Your service gets an address and becomes reachable through the domain you mapped.</div>
            </div>
            <div class="metric">
              <div class="label">Frontend</div>
              <div class="value">Nginx</div>
              <div class="desc">A lightweight web server serves a single-page UI from a mounted ConfigMap.</div>
            </div>
          </section>

          <div class="footer">
            <div class="footer-card">
              <div>
                <strong>Deployment successfully modernized</strong>
                <span>Same app identity, better presentation layer, no selector breakage.</span>
              </div>
              <div class="badge">demo-app preserved</div>
            </div>
          </div>
        </div>
      </div>

      <script>
        function showStatus() {
          alert("UI is live and being served by demo-app through the Istio Gateway API path.");
        }

        function scrollToDetails() {
          document.getElementById("details").scrollIntoView({ behavior: "smooth" });
        }
      </script>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: demo-app
        image: nginx:1.27-alpine
        ports:
        - containerPort: 5678
        volumeMounts:
        - name: ui
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
        - name: ui
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
      volumes:
      - name: ui
        configMap:
          name: demo-app-ui
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: default
spec:
  selector:
    app: demo-app
  ports:
    - port: 80
      targetPort: 5678
