apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: metallb-system
helmCharts:
  - name: metallb
    repo: https://metallb.github.io/metallb
    version: ${ARGOCD_ENV_metallb_version}
    releaseName: metallb
    namespace: metallb-system
    valuesFile: values.yaml
resources:
  - metallb-monitor-services.yaml
  - metallb-pool.yaml
