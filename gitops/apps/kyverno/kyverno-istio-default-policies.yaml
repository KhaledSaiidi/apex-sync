apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: label-platform-namespaces-for-istio
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  admission: true
  background: true
  emitWarning: false
  mutateExistingOnPolicyUpdate: true
  validationFailureAction: Audit
  rules:
    - name: add-istio-injection-label-to-platform-namespaces
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - observability
                - keycloak
      mutate:
        targets:
          - apiVersion: v1
            kind: Namespace
            name: observability
          - apiVersion: v1
            kind: Namespace
            name: keycloak
        patchStrategicMerge:
          metadata:
            labels:
              istio-injection: enabled
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restart-platform-workloads-after-istio-label
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  rules:
    - name: restart-deployments-when-observability-namespace-is-labeled
      skipBackgroundRequests: false
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - observability
              operations:
                - CREATE
                - UPDATE
      preconditions:
        all:
          - key: "{{ request.object.metadata.labels.\"istio-injection\" || '' }}"
            operator: Equals
            value: enabled
      mutate:
        mutateExistingOnPolicyUpdate: false
        targets:
          - apiVersion: apps/v1
            kind: Deployment
            namespace: observability
        patchStrategicMerge:
          spec:
            template:
              metadata:
                annotations:
                  ops.corp.com/triggerrestart: "{{ request.object.metadata.resourceVersion }}"
    - name: restart-deployments-when-keycloak-namespace-is-labeled
      skipBackgroundRequests: false
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - keycloak
              operations:
                - CREATE
                - UPDATE
      preconditions:
        all:
          - key: "{{ request.object.metadata.labels.\"istio-injection\" || '' }}"
            operator: Equals
            value: enabled
      mutate:
        mutateExistingOnPolicyUpdate: false
        targets:
          - apiVersion: apps/v1
            kind: Deployment
            namespace: keycloak
        patchStrategicMerge:
          spec:
            template:
              metadata:
                annotations:
                  ops.corp.com/triggerrestart: "{{ request.object.metadata.resourceVersion }}"
    - name: restart-statefulsets-when-keycloak-namespace-is-labeled
      skipBackgroundRequests: false
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - keycloak
              operations:
                - CREATE
                - UPDATE
      preconditions:
        all:
          - key: "{{ request.object.metadata.labels.\"istio-injection\" || '' }}"
            operator: Equals
            value: enabled
      mutate:
        mutateExistingOnPolicyUpdate: false
        targets:
          - apiVersion: apps/v1
            kind: StatefulSet
            namespace: keycloak
        patchStrategicMerge:
          spec:
            template:
              metadata:
                annotations:
                  ops.corp.com/triggerrestart: "{{ request.object.metadata.resourceVersion }}"
    - name: restart-statefulsets-when-observability-namespace-is-labeled
      skipBackgroundRequests: false
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - observability
              operations:
                - CREATE
                - UPDATE
      preconditions:
        all:
          - key: "{{ request.object.metadata.labels.\"istio-injection\" || '' }}"
            operator: Equals
            value: enabled
      mutate:
        mutateExistingOnPolicyUpdate: false
        targets:
          - apiVersion: apps/v1
            kind: StatefulSet
            namespace: observability
        patchStrategicMerge:
          spec:
            template:
              metadata:
                annotations:
                  ops.corp.com/triggerrestart: "{{ request.object.metadata.resourceVersion }}"
    - name: restart-daemonsets-when-observability-namespace-is-labeled
      skipBackgroundRequests: false
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - observability
              operations:
                - CREATE
                - UPDATE
      preconditions:
        all:
          - key: "{{ request.object.metadata.labels.\"istio-injection\" || '' }}"
            operator: Equals
            value: enabled
      mutate:
        mutateExistingOnPolicyUpdate: false
        targets:
          - apiVersion: apps/v1
            kind: DaemonSet
            namespace: observability
        patchStrategicMerge:
          spec:
            template:
              metadata:
                annotations:
                  ops.corp.com/triggerrestart: "{{ request.object.metadata.resourceVersion }}"
