admissionController:
  replicas: 2
  apiPriorityAndFairness: true
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  container:
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi
  metricsService:
    create: true
  serviceMonitor:
    enabled: false

backgroundController:
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi
  metricsService:
    create: true
  serviceMonitor:
    enabled: false

cleanupController:
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi
  metricsService:
    create: true
  serviceMonitor:
    enabled: false

reportsController:
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi
  metricsService:
    create: true
  serviceMonitor:
    enabled: false
