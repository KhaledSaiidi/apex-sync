apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-route53
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  acme:
    email: "${ARGOCD_ENV_cert_manager_acme_email}"
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-route53-account-key
    solvers:
      - dns01:
          route53:
            region: "${ARGOCD_ENV_cert_manager_route53_region}"
            hostedZoneID: "${ARGOCD_ENV_cert_manager_route53_hosted_zone_id}"
            accessKeyIDSecretRef:
              name: route53-credentials-secret
              key: aws_access_key_id
            secretAccessKeySecretRef:
              name: route53-credentials-secret
              key: aws_secret_access_key
