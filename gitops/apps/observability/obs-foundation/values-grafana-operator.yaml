namespaceScope: true
leaderElect: true
replicas: ${ARGOCD_ENV_grafana_operator_replicas}
revisionHistoryLimit: ${ARGOCD_ENV_observability_grafana_operator_revision_history_limit}

enforceCacheLabels: "safe"
defaultResyncPeriod: ${ARGOCD_ENV_observability_grafana_operator_default_resync_period}
maxConcurrentReconciles: ${ARGOCD_ENV_observability_grafana_operator_max_concurrent_reconciles}

logging:
  encoder: ${ARGOCD_ENV_observability_grafana_operator_log_encoder}
  level: ${ARGOCD_ENV_observability_grafana_operator_log_level}
  time: ${ARGOCD_ENV_observability_grafana_operator_log_time}

rbac:
  create: true
  useClusterRole: false

serviceAccount:
  create: true

kubeAuth:
  audience: "operator.grafana.com"
  expirationSeconds: ${ARGOCD_ENV_observability_grafana_operator_kube_auth_expiration_seconds}

metricsService:
  type: ClusterIP

serviceMonitor:
  enabled: true
  interval: ${ARGOCD_ENV_observability_grafana_operator_service_monitor_interval}
  scrapeTimeout: ${ARGOCD_ENV_observability_grafana_operator_service_monitor_scrape_timeout}

dashboard:
  enabled: false

resources:
  requests:
    cpu: "${ARGOCD_ENV_resource_grafana_operator_requests_cpu}"
    memory: "${ARGOCD_ENV_resource_grafana_operator_requests_memory}"
  limits:
    cpu: "${ARGOCD_ENV_resource_grafana_operator_limits_cpu}"
    memory: "${ARGOCD_ENV_resource_grafana_operator_limits_memory}"

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: grafana-operator
          topologyKey: kubernetes.io/hostname
