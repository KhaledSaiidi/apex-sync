apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability
resources:
  - namespace.yaml
helmCharts:
  - name: prometheus-operator-crds
    repo: https://prometheus-community.github.io/helm-charts
    version: ${ARGOCD_ENV_prometheus_operator_crds_version}
    releaseName: prometheus-operator-crds
    namespace: observability
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: ${ARGOCD_ENV_prometheus_operator_version}
    releaseName: prometheus-operator
    namespace: observability
    valuesFile: values-prometheus-operator.yaml
  - name: grafana-operator
    repo: https://grafana.github.io/helm-charts
    version: ${ARGOCD_ENV_grafana_operator_version}
    releaseName: grafana-operator
    namespace: observability
    valuesFile: values-grafana-operator.yaml
  - name: opentelemetry-operator
    repo: https://open-telemetry.github.io/opentelemetry-helm-charts
    version: ${ARGOCD_ENV_opentelemetry_operator_version}
    releaseName: opentelemetry-operator
    namespace: observability
    valuesFile: values-opentelemetry-operator.yaml
