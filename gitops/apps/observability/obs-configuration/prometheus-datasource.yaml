apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  finalizers:
  - operator.grafana.com/finalizer
  generation: 1
  name: prometheus
  namespace: observability
spec:
  allowCrossNamespaceImport: false
  datasource:
    access: proxy
    editable: true
    isDefault: true
    jsonData:
      timeInterval: 5m
    name: Prometheus
    type: prometheus
    url: http://prometheus-operated:9090
  instanceSelector:
    matchLabels:
      dashboards: grafana
  resyncPeriod: 10m0s