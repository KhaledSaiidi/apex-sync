apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-gateway
  namespace: observability
spec:
  mode: deployment
  replicas: 2
  image: otel/opentelemetry-collector-contrib:0.114.0
  serviceAccount: otel-collector
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 768
        spike_limit_mib: 256
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.node.name
      batch:
        timeout: 5s
        send_batch_size: 8192
    exporters:
      prometheusremotewrite/mimir:
        endpoint: http://mimir-distributed-gateway.observability.svc.cluster.local/api/v1/push
      otlphttp/loki:
        endpoint: http://loki-gateway.observability.svc.cluster.local/otlp
      otlp/tempo:
        endpoint: tempo-grafana-tempo-distributor.observability.svc.cluster.local:4317
        tls:
          insecure: true
    service:
      pipelines:
        metrics:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - k8sattributes
            - batch
          exporters:
            - prometheusremotewrite/mimir
        logs:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - k8sattributes
            - batch
          exporters:
            - otlphttp/loki
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - k8sattributes
            - batch
          exporters:
            - otlp/tempo
