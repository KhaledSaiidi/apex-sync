crds:
  enabled: false

grafana:
  enabled: false

nodeExporter:
  enabled: false

kubelet:
  enabled: false

kubeStateMetrics:
  enabled: true

kube-state-metrics:
  replicas: ${ARGOCD_ENV_kube_state_metrics_replicas}
  resources:
    requests:
      cpu: "${ARGOCD_ENV_resource_kube_state_metrics_requests_cpu}"
      memory: "${ARGOCD_ENV_resource_kube_state_metrics_requests_memory}"
    limits:
      cpu: "${ARGOCD_ENV_resource_kube_state_metrics_limits_cpu}"
      memory: "${ARGOCD_ENV_resource_kube_state_metrics_limits_memory}"

defaultRules:
  create: true

alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: ${ARGOCD_ENV_prometheus_alertmanager_replicas}
    resources:
      requests:
        cpu: "${ARGOCD_ENV_resource_prometheus_alertmanager_requests_cpu}"
        memory: "${ARGOCD_ENV_resource_prometheus_alertmanager_requests_memory}"
      limits:
        cpu: "${ARGOCD_ENV_resource_prometheus_alertmanager_limits_cpu}"
        memory: "${ARGOCD_ENV_resource_prometheus_alertmanager_limits_memory}"

prometheusOperator:
  enabled: true
  revisionHistoryLimit: 3
  kubeletService:
    enabled: false
  admissionWebhooks:
    enabled: true
    failurePolicy: IgnoreOnInstallOnly
    timeoutSeconds: 10
    patch:
      enabled: true
      ttlSecondsAfterFinished: 60
      resources:
        requests:
          cpu: "${ARGOCD_ENV_resource_prometheus_operator_webhook_patch_requests_cpu}"
          memory: "${ARGOCD_ENV_resource_prometheus_operator_webhook_patch_requests_memory}"
        limits:
          cpu: "${ARGOCD_ENV_resource_prometheus_operator_webhook_patch_limits_cpu}"
          memory: "${ARGOCD_ENV_resource_prometheus_operator_webhook_patch_limits_memory}"
  serviceAccount:
    create: true
    automountServiceAccountToken: true
  serviceMonitor:
    selfMonitor: true
    interval: 1m
    scrapeTimeout: 10s
  resources:
    requests:
      cpu: "${ARGOCD_ENV_resource_prometheus_operator_requests_cpu}"
      memory: "${ARGOCD_ENV_resource_prometheus_operator_requests_memory}"
    limits:
      cpu: "${ARGOCD_ENV_resource_prometheus_operator_limits_cpu}"
      memory: "${ARGOCD_ENV_resource_prometheus_operator_limits_memory}"
  env:
    GOGC: "75"
  securityContext:
    fsGroup: 65534
    runAsGroup: 65534
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

prometheus:
  enabled: true
  prometheusSpec:
    replicas: ${ARGOCD_ENV_prometheus_replicas}
    retention: 12h
    remoteWrite:
      - url: http://mimir-distributed-gateway.observability.svc.cluster.local/api/v1/push
    resources:
      requests:
        cpu: "${ARGOCD_ENV_resource_prometheus_requests_cpu}"
        memory: "${ARGOCD_ENV_resource_prometheus_requests_memory}"
      limits:
        cpu: "${ARGOCD_ENV_resource_prometheus_limits_cpu}"
        memory: "${ARGOCD_ENV_resource_prometheus_limits_memory}"
