crds:
  create: false

alloy:
  mounts:
    varlog: true
    extra:
      - name: hostfs
        mountPath: /hostfs
        readOnly: true
      - name: proc
        mountPath: /host/proc
        readOnly: true
      - name: sys
        mountPath: /host/sys
        readOnly: true
  resources:
    requests:
      cpu: "${ARGOCD_ENV_resource_alloy_daemonset_requests_cpu}"
      memory: "${ARGOCD_ENV_resource_alloy_daemonset_requests_memory}"
    limits:
      cpu: "${ARGOCD_ENV_resource_alloy_daemonset_limits_cpu}"
      memory: "${ARGOCD_ENV_resource_alloy_daemonset_limits_memory}"
  configMap:
    content: |-
      logging {
        level  = "${ARGOCD_ENV_observability_alloy_log_level}"
        format = "${ARGOCD_ENV_observability_alloy_log_format}"
      }

      prometheus.remote_write "mimir" {
        endpoint {
          url = "http://mimir-distributed-gateway.observability.svc.cluster.local/api/v1/push"
        }
      }

      prometheus.exporter.unix "node" {
        rootfs_path = "/hostfs"
        procfs_path = "/host/proc"
        sysfs_path  = "/host/sys"
      }

      prometheus.scrape "node" {
        targets         = prometheus.exporter.unix.node.targets
        scrape_interval = "${ARGOCD_ENV_observability_alloy_node_scrape_interval}"
        forward_to      = [prometheus.remote_write.mimir.receiver]
      }

      discovery.kubernetes "node" {
        role = "node"
        selectors {
          role  = "node"
          field = "metadata.name=" + sys.env("K8S_NODE_NAME")
        }
      }

      prometheus.scrape "kubelet" {
        targets           = discovery.kubernetes.node.targets
        scheme            = "https"
        metrics_path      = "/metrics"
        scrape_interval   = "${ARGOCD_ENV_observability_alloy_kubelet_scrape_interval}"
        scrape_timeout    = "${ARGOCD_ENV_observability_alloy_kubelet_scrape_timeout}"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
          insecure_skip_verify = true
        }
        forward_to = [prometheus.remote_write.mimir.receiver]
      }

      prometheus.scrape "cadvisor" {
        targets           = discovery.kubernetes.node.targets
        scheme            = "https"
        metrics_path      = "/metrics/cadvisor"
        scrape_interval   = "${ARGOCD_ENV_observability_alloy_cadvisor_scrape_interval}"
        scrape_timeout    = "${ARGOCD_ENV_observability_alloy_cadvisor_scrape_timeout}"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
          insecure_skip_verify = true
        }
        forward_to = [prometheus.remote_write.mimir.receiver]
      }

      prometheus.scrape "resource" {
        targets           = discovery.kubernetes.node.targets
        scheme            = "https"
        metrics_path      = "/metrics/resource"
        scrape_interval   = "${ARGOCD_ENV_observability_alloy_resource_scrape_interval}"
        scrape_timeout    = "${ARGOCD_ENV_observability_alloy_resource_scrape_timeout}"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
          insecure_skip_verify = true
        }
        forward_to = [prometheus.remote_write.mimir.receiver]
      }

      discovery.kubernetes "pod" {
        role = "pod"
        selectors {
          role  = "pod"
          field = "spec.nodeName=" + sys.env("K8S_NODE_NAME")
        }
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pod.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          action        = "replace"
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          action        = "replace"
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          action        = "replace"
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          action        = "replace"
          target_label  = "app"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
          action        = "replace"
          target_label  = "job"
          separator     = "/"
          replacement   = "$1"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
          action        = "replace"
          target_label  = "__path__"
          separator     = "/"
          replacement   = "/var/log/pods/*$1/*.log"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_id"]
          action        = "replace"
          target_label  = "container_runtime"
          regex         = `^(\S+):\/\/.+$`
          replacement   = "$1"
        }
      }

      loki.write "loki" {
        endpoint {
          url = "http://loki-gateway.observability.svc.cluster.local/loki/api/v1/push"
        }
      }

      local.file_match "pod_logs" {
        path_targets = discovery.relabel.pod_logs.output
      }

      loki.source.file "pod_logs" {
        targets    = local.file_match.pod_logs.targets
        forward_to = [loki.process.pod_logs.receiver]
      }

      loki.process "pod_logs" {
        forward_to = [loki.write.loki.receiver]
      }

controller:
  type: daemonset
  tolerations:
    - operator: Exists
  volumes:
    extra:
      - name: hostfs
        hostPath:
          path: /
      - name: proc
        hostPath:
          path: /proc
      - name: sys
        hostPath:
          path: /sys

service:
  enabled: true
  type: ClusterIP

serviceMonitor:
  enabled: true
  interval: ${ARGOCD_ENV_observability_alloy_service_monitor_interval}
