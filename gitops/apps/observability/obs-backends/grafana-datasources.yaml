apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: mimir
  namespace: observability
spec:
  allowCrossNamespaceImport: false
  datasource:
    access: proxy
    editable: true
    isDefault: true
    jsonData:
      timeInterval: 1m
    name: Mimir
    type: prometheus
    uid: Mimir
    url: http://mimir-distributed-gateway.observability.svc.cluster.local/prometheus
  instanceSelector:
    matchLabels:
      dashboards: grafana
  resyncPeriod: 10m0s
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus
