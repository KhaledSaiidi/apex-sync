apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-daemonset
  namespace: observability
spec:
  mode: daemonset
  image: otel/opentelemetry-collector-contrib:0.114.0
  serviceAccount: otel-collector
  env:
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
  tolerations:
    - operator: Exists
  resources:
    requests:
      cpu: "${ARGOCD_ENV_resource_otel_daemonset_requests_cpu}"
      memory: "${ARGOCD_ENV_resource_otel_daemonset_requests_memory}"
    limits:
      cpu: "${ARGOCD_ENV_resource_otel_daemonset_limits_cpu}"
      memory: "${ARGOCD_ENV_resource_otel_daemonset_limits_memory}"
  volumeMounts:
    - name: varlog
      mountPath: /var/log
      readOnly: true
    - name: hostfs
      mountPath: /hostfs
      readOnly: true
  volumes:
    - name: varlog
      hostPath:
        path: /var/log
    - name: hostfs
      hostPath:
        path: /
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      hostmetrics:
        root_path: /hostfs
        collection_interval: 30s
        scrapers:
          cpu: {}
          disk: {}
          filesystem:
            exclude_mount_points:
              mount_points:
                - /dev/*
                - /proc/*
                - /sys/*
                - /run/containerd/*
                - /var/lib/kubelet/*
              match_type: regexp
          load: {}
          memory: {}
          network: {}
          processes: {}
      kubeletstats:
        collection_interval: 30s
        auth_type: serviceAccount
        endpoint: https://${env:K8S_NODE_NAME}:10250
        insecure_skip_verify: true
        metric_groups:
          - node
          - pod
          - container
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          - /var/log/pods/observability_otel-daemonset-collector*/*/*.log
        start_at: end
        include_file_path: true
        include_file_name: false
        operators:
          - type: container
    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 512
        spike_limit_mib: 128
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.container.name
            - k8s.node.name
      batch:
        timeout: 5s
        send_batch_size: 8192
    exporters:
      otlp/gateway:
        endpoint: otel-gateway-collector.observability.svc.cluster.local:4317
        tls:
          insecure: true
    service:
      pipelines:
        metrics:
          receivers:
            - hostmetrics
            - kubeletstats
            - otlp
          processors:
            - memory_limiter
            - k8sattributes
            - batch
          exporters:
            - otlp/gateway
        logs:
          receivers:
            - filelog
            - otlp
          processors:
            - memory_limiter
            - k8sattributes
            - batch
          exporters:
            - otlp/gateway
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - k8sattributes
            - batch
          exporters:
            - otlp/gateway
