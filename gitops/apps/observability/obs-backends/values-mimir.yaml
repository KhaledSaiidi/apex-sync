  resources:
    requests:
      cpu: "${ARGOCD_ENV_resource_mimir_memcached_exporter_requests_cpu}"
      memory: "${ARGOCD_ENV_resource_mimir_memcached_exporter_requests_memory}"
    limits:
      cpu: "${ARGOCD_ENV_resource_mimir_memcached_exporter_limits_cpu}"
      memory: "${ARGOCD_ENV_resource_mimir_memcached_exporter_limits_memory}"

chunks-cache:
  enabled: true
  replicas: ${ARGOCD_ENV_mimir_chunks_cache_replicas}
  allocatedMemory: 512
  resources: &mimirCacheResources
    requests:
      cpu: "${ARGOCD_ENV_resource_mimir_cache_requests_cpu}"
      memory: "${ARGOCD_ENV_resource_mimir_cache_requests_memory}"
    limits:
      cpu: "${ARGOCD_ENV_resource_mimir_cache_limits_cpu}"
      memory: "${ARGOCD_ENV_resource_mimir_cache_limits_memory}"
  tolerations: *allTolerations

index-cache:
  enabled: true
  replicas: ${ARGOCD_ENV_mimir_index_cache_replicas}
  allocatedMemory: 512
  resources: *mimirCacheResources
  tolerations: *allTolerations

metadata-cache:
  enabled: true
  replicas: ${ARGOCD_ENV_mimir_metadata_cache_replicas}
  allocatedMemory: 512
  resources: *mimirCacheResources
