  extraArgs: *mimirExtraArgs
  persistentVolume:
    enabled: true
    size: 20Gi
  resources:
    requests:
      cpu: "${ARGOCD_ENV_resource_mimir_compactor_requests_cpu}"
      memory: "${ARGOCD_ENV_resource_mimir_compactor_requests_memory}"
    limits:
      cpu: "${ARGOCD_ENV_resource_mimir_compactor_limits_cpu}"
      memory: "${ARGOCD_ENV_resource_mimir_compactor_limits_memory}"
  tolerations: *allTolerations

gateway:
  replicas: ${ARGOCD_ENV_mimir_gateway_replicas}
  resources:
    requests:
      cpu: "${ARGOCD_ENV_resource_mimir_gateway_requests_cpu}"
      memory: "${ARGOCD_ENV_resource_mimir_gateway_requests_memory}"
    limits:
      cpu: "${ARGOCD_ENV_resource_mimir_gateway_limits_cpu}"
      memory: "${ARGOCD_ENV_resource_mimir_gateway_limits_memory}"
  tolerations: *allTolerations

