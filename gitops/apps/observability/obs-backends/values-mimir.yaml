  tolerations: *allTolerations

store_gateway:
  replicas: ${ARGOCD_ENV_mimir_store_gateway_replicas}
  extraArgs: *mimirExtraArgs
  persistentVolume:
    enabled: true
    size: 10Gi
  resources:
    requests:
      cpu: "${ARGOCD_ENV_resource_mimir_store_gateway_requests_cpu}"
      memory: "${ARGOCD_ENV_resource_mimir_store_gateway_requests_memory}"
    limits:
