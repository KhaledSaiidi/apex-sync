apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: openebs-lvm-localpv-node
  labels:
    app.kubernetes.io/name: openebs-lvm-localpv
    app.kubernetes.io/instance: openebs
    app.kubernetes.io/component: node
    app.kubernetes.io/part-of: observability
spec:
  jobLabel: name
  namespaceSelector:
    matchNames:
      - openebs
  selector:
    matchLabels:
      role: openebs-lvm
      name: openebs-lvm-node
      release: openebs
  endpoints:
    - port: metrics
      path: /metrics
      scheme: http
      interval: 30s
      scrapeTimeout: 10s
