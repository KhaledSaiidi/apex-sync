apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: istio-service-traffic
  namespace: observability
spec:
  allowCrossNamespaceImport: false
  datasources:
  - datasourceName: Mimir
    inputName: datasource
  folderRef: istio
  instanceSelector:
    matchLabels:
      dashboards: grafana
  resyncPeriod: 10m0s
  url: https://raw.githubusercontent.com/istio/istio/1.29.2/manifests/addons/dashboards/istio-service-dashboard.json
