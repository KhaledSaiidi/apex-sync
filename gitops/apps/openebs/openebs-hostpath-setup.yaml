apiVersion: batch/v1
kind: Job
metadata:
  name: openebs-hostpath-setup-hook
  namespace: openebs
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-10"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: openebs-hostpath-setup
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: bitnami/kubectl:latest
          resources:
            requests:
              cpu: "${ARGOCD_ENV_resource_openebs_hostpath_setup_requests_cpu}"
              memory: "${ARGOCD_ENV_resource_openebs_hostpath_setup_requests_memory}"
            limits:
              cpu: "${ARGOCD_ENV_resource_openebs_hostpath_setup_limits_cpu}"
              memory: "${ARGOCD_ENV_resource_openebs_hostpath_setup_limits_memory}"
          command:
            - sh
            - -c
            - |
              set -e

              kubectl get nodes -o custom-columns=NAME:.metadata.name --no-headers \
                | xargs -r -I{} sh -c '
                    cat <<EOF | kubectl apply -f -
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: openebs-hostpath-setup-{}
                namespace: openebs
                labels:
                  app: openebs-hostpath-setup
              spec:
                template:
                  spec:
                    restartPolicy: OnFailure
                    nodeName: {}
                    tolerations:
                      - operator: Exists
                    containers:
                      - name: hostpath-setup
                        image: docker.io/library/busybox:1.36.1
                        resources:
                        requests:
                            cpu: "${ARGOCD_ENV_resource_openebs_hostpath_chown_requests_cpu}"
                            memory: "${ARGOCD_ENV_resource_openebs_hostpath_chown_requests_memory}"
                        limits:
                            cpu: "${ARGOCD_ENV_resource_openebs_hostpath_chown_limits_cpu}"
                            memory: "${ARGOCD_ENV_resource_openebs_hostpath_chown_limits_memory}"
                        command:
                          - sh
                          - -c
                          - |
                            mkdir -p /host/var/openebs/apex-sync
                            chmod 0777 /host/var/openebs/apex-sync
                        securityContext:
                          runAsUser: 0
                        volumeMounts:
                          - name: host-root
                            mountPath: /host
                    volumes:
                      - name: host-root
                        hostPath:
                          path: /
                          type: Directory
              EOF
                  '

              kubectl wait --for=condition=complete job -l app=openebs-hostpath-setup -n openebs --timeout=1200s

              kubectl delete job -n openebs -l app=openebs-hostpath-setup --ignore-not-found=true
