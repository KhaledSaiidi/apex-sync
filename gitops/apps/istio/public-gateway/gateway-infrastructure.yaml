apiVersion: v1
kind: ConfigMap
metadata:
  name: public-gateway-infrastructure
  namespace: istio-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "10"
data:
  service: |
    metadata:
      labels:
        app.kubernetes.io/name: public-gateway
        app.kubernetes.io/instance: public-gateway
        app.kubernetes.io/component: gateway
    spec:
      type: LoadBalancer
      externalTrafficPolicy: Cluster
  deployment: |
    spec:
      replicas: ${ARGOCD_ENV_public_gateway_replicas}
      template:
        metadata:
          labels:
            app: istio-ingress-gateway
            istio: ingressgateway
        spec:
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
            - key: node-role.kubernetes.io/master
              operator: Exists
              effect: NoSchedule
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app: istio-ingress-gateway
          containers:
            - name: istio-proxy
              resources:
                requests:
                  cpu: "${ARGOCD_ENV_resource_public_gateway_requests_cpu}"
                  memory: "${ARGOCD_ENV_resource_public_gateway_requests_memory}"
                limits:
                  cpu: "${ARGOCD_ENV_resource_public_gateway_limits_cpu}"
                  memory: "${ARGOCD_ENV_resource_public_gateway_limits_memory}"
  horizontalPodAutoscaler: |
    spec:
      minReplicas: ${ARGOCD_ENV_public_gateway_min_replicas}
      maxReplicas: ${ARGOCD_ENV_public_gateway_max_replicas}
      metrics:
        - type: Resource
          resource:
            name: cpu
            target:
              type: Utilization
              averageUtilization: 80
        - type: Resource
          resource:
            name: memory
            target:
              type: Utilization
              averageUtilization: 80
  podDisruptionBudget: |
    spec:
      minAvailable: 1
