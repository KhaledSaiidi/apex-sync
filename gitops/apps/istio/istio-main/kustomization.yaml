apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: istio-system
helmCharts:
  - name: base
    repo: https://istio-release.storage.googleapis.com/charts
    version: ${ARGOCD_ENV_istio_main_version}
    releaseName: istio-base
    namespace: istio-system
  - name: istiod
    repo: https://istio-release.storage.googleapis.com/charts
    version: ${ARGOCD_ENV_istio_main_version}
    releaseName: istiod
    namespace: istio-system
