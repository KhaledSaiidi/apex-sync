apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: istio-system
resources:
  - https://github.com/kubernetes-sigs/gateway-api/releases/download/${ARGOCD_ENV_gateway_api_version}/standard-install.yaml
helmCharts:
  - name: base
    repo: https://istio-release.storage.googleapis.com/charts
    version: ${ARGOCD_ENV_istio_main_version}
    releaseName: istio-base
    namespace: istio-system
  - name: istiod
    repo: https://istio-release.storage.googleapis.com/charts
    version: ${ARGOCD_ENV_istio_main_version}
    releaseName: istiod
    namespace: istio-system
    valuesFile: values-istiod.yaml
