apiVersion: batch/v1
kind: Job
metadata:
  name: garage-cluster-layout-bootstrap
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: garage-backup-bootstrap
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: GARAGE_NAMESPACE
              value: garage
            - name: GARAGE_LABEL_SELECTOR
              value: app.kubernetes.io/name=garage,app.kubernetes.io/instance=garage
            - name: GARAGE_REPLICA_COUNT
              value: "3"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          command:
            - /bin/sh
            - -ec
            - |
              set -eu
              namespace="$(printenv GARAGE_NAMESPACE)"
              selector="$(printenv GARAGE_LABEL_SELECTOR)"
              replica_count="$(printenv GARAGE_REPLICA_COUNT)"

              timeout 900 sh -ec '
                while [ "$(kubectl get pod \
                  --namespace "$1" \
                  --selector "$2" \
                  --field-selector=status.phase=Running \
                  --no-headers 2>/dev/null | wc -l | tr -d " ")" != "$3" ]; do
                  sleep 5
                done
              ' _ "$namespace" "$selector" "$replica_count"

              kubectl get pod \
                --namespace "$namespace" \
                --selector "$selector" \
                --field-selector=status.phase=Running \
                -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.podIP}{"\t"}{.spec.nodeName}{"\n"}{end}' > /tmp/garage-pods.tsv

              : > /tmp/garage-assignments.tsv

              while IFS="$(printf '\t')" read -r pod_name pod_ip node_name; do
                timeout 900 sh -ec '
                  until kubectl exec -n "$1" "$2" -- /garage node id >/tmp/garage-node-id 2>/dev/null; do
                    sleep 5
                  done
                ' _ "$namespace" "$pod_name"

                requested_capacity="$(kubectl get pvc \
                  --namespace "$namespace" \
                  "data-$pod_name" \
                  -o jsonpath='{.spec.resources.requests.storage}')"
                capacity="$(printf '%s' "$requested_capacity" | sed 's/Gi$/GB/')"

                if [ "$capacity" = "$requested_capacity" ]; then
                  echo "Unsupported Garage PVC capacity format for pod $pod_name" >&2
                  exit 1
                fi

                zone="$(kubectl get node "$node_name" -o jsonpath='{.metadata.labels.topology\.kubernetes\.io/zone}' 2>/dev/null || true)"
                if [ -z "$zone" ]; then
                  zone="$node_name"
                fi

                node_id="$(cut -d@ -f1 /tmp/garage-node-id | tr -d '\n')"
                printf "%s\t%s\t%s\t%s\n" \
                  "$pod_ip" \
                  "$node_id" \
                  "$zone" \
                  "$capacity" \
                  >> /tmp/garage-assignments.tsv
              done < /tmp/garage-pods.tsv

              timeout 900 sh -ec '
                until kubectl exec -n "$1" garage-0 -- /garage status >/tmp/garage-status.txt 2>/dev/null; do
                  sleep 5
                done
              ' _ "$namespace"

              if ! grep -q "NO ROLE ASSIGNED" /tmp/garage-status.txt; then
                desired_assignments="$(wc -l < /tmp/garage-assignments.tsv | tr -d ' ')"
                matched_assignments=0

                while IFS="$(printf '\t')" read -r pod_ip node_id zone capacity; do
                  if grep -F "$pod_ip" /tmp/garage-status.txt | grep -F "$zone" | grep -F "$capacity" >/dev/null; then
                    matched_assignments=$((matched_assignments + 1))
                  fi
                done < /tmp/garage-assignments.tsv

                if [ "$matched_assignments" = "$desired_assignments" ]; then
                  echo "Garage layout already matches the desired topology"
                  exit 0
                fi
              fi

              while IFS="$(printf '\t')" read -r pod_ip node_id zone capacity; do
                kubectl exec -n "$namespace" garage-0 -- /garage layout assign "$node_id" -z "$zone" -c "$capacity" -t "$pod_ip"
              done < /tmp/garage-assignments.tsv

              kubectl exec -n "$namespace" garage-0 -- /garage layout show >/tmp/garage-layout.txt
              layout_version="$(awk -F': *' '/Current cluster layout version:/ {print $2; exit}' /tmp/garage-layout.txt | tr -d ' ')"
              kubectl exec -n "$namespace" garage-0 -- /garage layout apply --version "$((layout_version + 1))"
