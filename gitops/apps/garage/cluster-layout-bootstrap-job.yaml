apiVersion: batch/v1
kind: Job
metadata:
  name: garage-cluster-layout-bootstrap
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: garage-backup-bootstrap
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: GARAGE_NAMESPACE
              value: garage
            - name: GARAGE_LABEL_SELECTOR
              value: app.kubernetes.io/name=garage,app.kubernetes.io/instance=garage
            - name: GARAGE_REPLICA_COUNT
              value: "3"
          resources:
            requests:
              cpu: "${ARGOCD_ENV_resource_garage_bootstrap_job_requests_cpu}"
              memory: "${ARGOCD_ENV_resource_garage_bootstrap_job_requests_memory}"
            limits:
              cpu: "${ARGOCD_ENV_resource_garage_bootstrap_job_limits_cpu}"
              memory: "${ARGOCD_ENV_resource_garage_bootstrap_job_limits_memory}"
          command:
            - /scripts/cluster-layout-bootstrap.sh
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: garage-cluster-layout-bootstrap-script
            defaultMode: 0555
