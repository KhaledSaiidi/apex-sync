apiVersion: batch/v1
kind: Job
metadata:
  name: garage-cluster-layout-bootstrap
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: garage-backup-bootstrap
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -ec
            - |
              set -eu

              timeout 900 sh -ec '
                while [ "$(kubectl get pod \
                  --namespace garage \
                  --selector app.kubernetes.io/name=garage,app.kubernetes.io/instance=garage \
                  --field-selector=status.phase=Running \
                  --no-headers 2>/dev/null | wc -l | tr -d " ")" != "$1" ]; do
                  sleep 5
                done
              ' _ 3

              kubectl get pod \
                --namespace garage \
                --selector app.kubernetes.io/name=garage,app.kubernetes.io/instance=garage \
                --field-selector=status.phase=Running \
                -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.podIP}{"\t"}{.spec.nodeName}{"\n"}{end}' > /tmp/garage-pods.tsv

              cat /tmp/garage-pods.tsv \
                | xargs -r -n 3 sh -ec '
                    timeout 900 sh -ec '"'"'
                      while [ -z "$(kubectl get garagenodes.deuxfleurs.fr \
                        --namespace garage \
                        -o jsonpath="{range .items[*]}{.metadata.name}{'\t'}{.spec.hostname}{'\t'}{.spec.address}{'\n'}{end}" \
                        | awk -F "\t" -v target_hostname="$1" -v target_ip="$2" '"'"'"'"'"'"'"'"'$2 == target_hostname && $3 == target_ip { print $1; exit }'"'"'"'"'"'"'"'"')" ]; do
                        sleep 5
                      done
                    '"'"' _ "$1" "$2"
                  ' _

              timeout 900 sh -ec '
                until kubectl exec -n garage garage-0 -- /garage status >/tmp/garage-status 2>/dev/null; do
                  sleep 5
                done
              '

              timeout 900 sh -ec '
                until kubectl exec -n garage garage-0 -- /garage layout show >/tmp/garage-layout.txt 2>/dev/null; do
                  sleep 5
                done
              '

              if ! grep -q "NO ROLE ASSIGNED" /tmp/garage-status \
                && [ "$(grep 'Current cluster layout version:' /tmp/garage-layout.txt | cut -d: -f2 | tr -d ' ')" -gt 0 ]; then
                echo "Garage layout already initialized"
                exit 0
              fi

              cat /tmp/garage-pods.tsv \
                | xargs -r -n 3 sh -ec '
                    if [ -z "$(kubectl get garagenodes.deuxfleurs.fr \
                      --namespace garage \
                      -o jsonpath="{range .items[*]}{.metadata.name}{'\t'}{.spec.hostname}{'\t'}{.spec.address}{'\n'}{end}" \
                      | awk -F "\t" -v target_hostname="$1" -v target_ip="$2" '"'"'"'"'"'"'"'"'$2 == target_hostname && $3 == target_ip { print $1; exit }'"'"'"'"'"'"'"'"')" ]; then
                      echo "Missing GarageNode resource for pod $1 ($2)" >&2
                      exit 1
                    fi
                    if [ "$(kubectl get pvc \
                      --namespace garage \
                      "data-$1" \
                      -o jsonpath='"'"'"'"'"'"'"'"'{.spec.resources.requests.storage}'"'"'"'"'"'"'"'"' \
                      | sed '"'"'"'"'"'"'"'"'s/Gi$/GB/'"'"'"'"'"'"'"'"')" = "$(kubectl get pvc \
                      --namespace garage \
                      "data-$1" \
                      -o jsonpath='"'"'"'"'"'"'"'"'{.spec.resources.requests.storage}'"'"'"'"'"'"'"'"')" ]; then
                      echo "Unsupported Garage PVC capacity format for pod $1" >&2
                      exit 1
                    fi
                    kubectl exec -n garage garage-0 -- \
                      /garage layout assign \
                      -z "$3" \
                      -c "$(kubectl get pvc \
                        --namespace garage \
                        "data-$1" \
                        -o jsonpath="{.spec.resources.requests.storage}" \
                        | sed '"'"'"'"'"'"'"'"'s/Gi$/GB/'"'"'"'"'"'"'"'"')" \
                      -t "$1" \
                      "$(kubectl get garagenodes.deuxfleurs.fr \
                        --namespace garage \
                        -o jsonpath="{range .items[*]}{.metadata.name}{'\t'}{.spec.hostname}{'\t'}{.spec.address}{'\n'}{end}" \
                        | awk -F "\t" -v target_hostname="$1" -v target_ip="$2" '"'"'"'"'"'"'"'"'$2 == target_hostname && $3 == target_ip { print $1; exit }'"'"'"'"'"'"'"'"')"
                  ' _

              kubectl exec -n garage garage-0 -- /garage layout show >/tmp/garage-layout.txt
              kubectl exec -n garage garage-0 -- /garage layout apply --version "$(( $(grep 'Current cluster layout version:' /tmp/garage-layout.txt | cut -d: -f2 | tr -d ' ') + 1 ))"
