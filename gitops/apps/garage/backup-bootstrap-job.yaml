apiVersion: batch/v1
kind: Job
metadata:
  name: garage-backup-bootstrap
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: garage-backup-bootstrap
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -ec
            - |
              set -eu

              GARAGE_NAMESPACE="garage"
              BUCKET_NAME="percona-backups"
              KEY_NAME="percona-backup-key"
              SECRET_NAME="percona-backup-garage-s3"
              ENDPOINT_URL="https://garage-s3.${ARGOCD_ENV_base_domain}"
              REGION="garage"
              GARAGE_LABEL_SELECTOR="app.kubernetes.io/name=garage,app.kubernetes.io/instance=garage"

              kubectl wait \
                --namespace "${GARAGE_NAMESPACE}" \
                --for=condition=ready pod \
                --selector "${GARAGE_LABEL_SELECTOR}" \
                --timeout=600s

              GARAGE_POD="$(kubectl get pod \
                --namespace "${GARAGE_NAMESPACE}" \
                --selector "${GARAGE_LABEL_SELECTOR}" \
                --output jsonpath='{.items[0].metadata.name}')"

              if [ -z "${GARAGE_POD}" ]; then
                echo "Garage pod not found" >&2
                exit 1
              fi

              if kubectl get secret "${SECRET_NAME}" -n "${GARAGE_NAMESPACE}" >/dev/null 2>&1; then
                EXISTING_ACCESS_KEY_ID="$(kubectl get secret "${SECRET_NAME}" \
                  -n "${GARAGE_NAMESPACE}" \
                  -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' | base64 -d)"
              else
                EXISTING_ACCESS_KEY_ID=""
              fi

              if [ -n "${EXISTING_ACCESS_KEY_ID}" ] && kubectl exec -n "${GARAGE_NAMESPACE}" "${GARAGE_POD}" -- /garage key info "${EXISTING_ACCESS_KEY_ID}" >/dev/null 2>&1; then
                KEY_PATTERN="${EXISTING_ACCESS_KEY_ID}"
              elif kubectl exec -n "${GARAGE_NAMESPACE}" "${GARAGE_POD}" -- /garage key info "${KEY_NAME}" >/dev/null 2>&1; then
                KEY_PATTERN="${KEY_NAME}"
              else
                kubectl exec -n "${GARAGE_NAMESPACE}" "${GARAGE_POD}" -- /garage key create "${KEY_NAME}" >/dev/null
                KEY_PATTERN="${KEY_NAME}"
              fi

              if ! kubectl exec -n "${GARAGE_NAMESPACE}" "${GARAGE_POD}" -- /garage bucket info "${BUCKET_NAME}" >/dev/null 2>&1; then
                kubectl exec -n "${GARAGE_NAMESPACE}" "${GARAGE_POD}" -- /garage bucket create "${BUCKET_NAME}" >/dev/null
              fi

              kubectl exec -n "${GARAGE_NAMESPACE}" "${GARAGE_POD}" -- /garage bucket allow --key "${KEY_PATTERN}" --read --write --owner "${BUCKET_NAME}" >/dev/null

              KEY_INFO="$(kubectl exec -n "${GARAGE_NAMESPACE}" "${GARAGE_POD}" -- /garage key info --show-secret "${KEY_PATTERN}")"
              ACCESS_KEY_ID="$(printf '%s\n' "${KEY_INFO}" | awk -F': *' '/Key ID:/ {print $2; exit}')"
              SECRET_ACCESS_KEY="$(printf '%s\n' "${KEY_INFO}" | awk -F': *' '/Secret key:/ {print $2; exit}')"

              if [ -z "${ACCESS_KEY_ID}" ] || [ -z "${SECRET_ACCESS_KEY}" ]; then
                echo "Failed to read Garage access key material" >&2
                exit 1
              fi

              cat <<EOF | kubectl apply -f -
              apiVersion: v1
              kind: Secret
              metadata:
                name: ${SECRET_NAME}
                namespace: ${GARAGE_NAMESPACE}
                annotations:
                  reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
                  reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "stateful-resources"
                  reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
                  reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "stateful-resources"
              type: Opaque
              stringData:
                AWS_ACCESS_KEY_ID: ${ACCESS_KEY_ID}
                AWS_SECRET_ACCESS_KEY: ${SECRET_ACCESS_KEY}
                AWS_ENDPOINT_URL: ${ENDPOINT_URL}
                AWS_REGION: ${REGION}
                BUCKET_NAME: ${BUCKET_NAME}
              EOF
