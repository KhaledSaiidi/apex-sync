apiVersion: batch/v1
kind: Job
metadata:
  name: garage-backup-lifecycle
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/sync-wave: "11"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: configure-lifecycle
          image: amazon/aws-cli:2.17.40
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          envFrom:
            - secretRef:
                name: percona-backup-garage-s3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          command:
            - /bin/sh
            - -ec
            - |
              set -eu

              set -- \
                "$(printenv AWS_REGION)" \
                "$(printenv BUCKET_NAME)"

              cat >/tmp/lifecycle.json <<EOF
              {
                "Rules": [
                  {
                    "ID": "expire-full-backups-after-7-days",
                    "Status": "Enabled",
                    "Filter": {
                      "Prefix": "full/"
                    },
                    "Expiration": {
                      "Days": 7
                    }
                  },
                  {
                    "ID": "expire-binlogs-after-1-day",
                    "Status": "Enabled",
                    "Filter": {
                      "Prefix": "binlogs/"
                    },
                    "Expiration": {
                      "Days": 1
                    }
                  },
                  {
                    "ID": "abort-incomplete-multipart-uploads",
                    "Status": "Enabled",
                    "Filter": {
                      "Prefix": ""
                    },
                    "AbortIncompleteMultipartUpload": {
                      "DaysAfterInitiation": 1
                    }
                  }
                ]
              }
              EOF

              aws s3api put-bucket-lifecycle-configuration \
                --endpoint-url "http://garage.garage.svc.cluster.local:3900" \
                --region "$1" \
                --bucket "$2" \
                --lifecycle-configuration "file:///tmp/lifecycle.json"
