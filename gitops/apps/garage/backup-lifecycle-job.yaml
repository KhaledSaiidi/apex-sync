apiVersion: batch/v1
kind: Job
metadata:
  name: garage-backup-lifecycle
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/sync-wave: "11"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: configure-lifecycle
          image: amazon/aws-cli:2.17.40
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          envFrom:
            - secretRef:
                name: percona-backup-garage-s3
          resources:
            requests:
              cpu: "${ARGOCD_ENV_resource_garage_backup_lifecycle_job_requests_cpu}"
              memory: "${ARGOCD_ENV_resource_garage_backup_lifecycle_job_requests_memory}"
            limits:
              cpu: "${ARGOCD_ENV_resource_garage_backup_lifecycle_job_limits_cpu}"
              memory: "${ARGOCD_ENV_resource_garage_backup_lifecycle_job_limits_memory}"
          command:
            - /scripts/backup-lifecycle.sh
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: garage-backup-lifecycle-script
            defaultMode: 0555
