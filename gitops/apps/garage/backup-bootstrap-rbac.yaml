apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: garage-backup-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: garage-backup-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
subjects:
  - kind: ServiceAccount
    name: garage-backup-bootstrap
    namespace: garage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: garage-backup-bootstrap
