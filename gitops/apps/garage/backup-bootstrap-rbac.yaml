apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: garage-backup-bootstrap
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: ["deuxfleurs.fr"]
    resources: ["garagenodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: garage-backup-bootstrap
subjects:
  - kind: ServiceAccount
    name: garage-backup-bootstrap
    namespace: garage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: garage-backup-bootstrap
