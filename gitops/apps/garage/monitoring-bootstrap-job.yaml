apiVersion: batch/v1
kind: Job
metadata:
  name: garage-monitoring-bootstrap
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/sync-wave: "12"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: garage-backup-bootstrap
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: GARAGE_NAMESPACE
              value: garage
            - name: ENDPOINT_URL
              value: https://garage-s3.${ARGOCD_ENV_base_domain}
            - name: REGION
              value: garage
            - name: GARAGE_LABEL_SELECTOR
              value: app.kubernetes.io/name=garage,app.kubernetes.io/instance=garage
            - name: GARAGE_TARGETS
              value: |
                loki-garage-s3|loki-garage-key|loki-chunks,loki-ruler,loki-admin|BUCKET_NAMES|observability
                tempo-garage-s3|tempo-garage-key|tempo-traces|BUCKET_NAMES|observability
                mimir-garage-s3|mimir-garage-key|mimir-blocks,mimir-ruler,mimir-alertmanager|BUCKET_NAMES|observability
          resources:
            requests:
              cpu: "${ARGOCD_ENV_resource_garage_bootstrap_job_requests_cpu}"
              memory: "${ARGOCD_ENV_resource_garage_bootstrap_job_requests_memory}"
            limits:
              cpu: "${ARGOCD_ENV_resource_garage_bootstrap_job_limits_cpu}"
              memory: "${ARGOCD_ENV_resource_garage_bootstrap_job_limits_memory}"
          command:
            - /scripts/bucket-secret-bootstrap.sh
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: garage-bucket-secret-bootstrap-script
            defaultMode: 0555
