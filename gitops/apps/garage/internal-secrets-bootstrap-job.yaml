apiVersion: batch/v1
kind: Job
metadata:
  name: garage-internal-secrets-bootstrap
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "-10"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: garage-backup-bootstrap
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: GARAGE_NAMESPACE
              value: garage
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          command:
            - /bin/sh
            - -ec
            - |
              set -eu

              set -- "$(printenv GARAGE_NAMESPACE)"

              if ! kubectl get secret garage-rpc-secret -n "$1" >/dev/null 2>&1; then
                kubectl create secret generic garage-rpc-secret \
                  -n "$1" \
                  --from-literal=rpcSecret="$(tr -dc 'a-f0-9' </dev/urandom | head -c 64)"
              fi

              if ! kubectl get secret garage-admin-token -n "$1" >/dev/null 2>&1; then
                kubectl create secret generic garage-admin-token \
                  -n "$1" \
                  --from-literal=token="$(tr -dc 'A-Za-z0-9' </dev/urandom | head -c 43)"
              fi
