apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-db-bootstrap
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-db-bootstrap
    spec:
      restartPolicy: OnFailure
      serviceAccountName: keycloak-db-bootstrap
      volumes:
        - name: db-credentials
          emptyDir: {}
      initContainers:
        - name: prepare-credentials
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -- "$(kubectl get secret mysql-cluster-secrets -n stateful-resources -o jsonpath='{.data.root}' | base64 -d)"
              printf "%s" "$1" > /work/root-password

              if kubectl get secret keycloak-db-credentials -n keycloak >/dev/null 2>&1; then
                set -- "$1" \
                  "$(kubectl get secret keycloak-db-credentials -n keycloak -o jsonpath='{.data.username}' | base64 -d)" \
                  "$(kubectl get secret keycloak-db-credentials -n keycloak -o jsonpath='{.data.password}' | base64 -d)"
              else
                set -- "$1" "keycloak" "$(head -c 32 /dev/urandom | base64 | tr -d '\n')"
              fi

              kubectl create secret generic keycloak-db-credentials -n keycloak \
                --from-literal=root-password="$1" \
                --from-literal=username="$2" \
                --from-literal=password="$3" \
                --dry-run=client \
                -o yaml | kubectl apply -f -

              printf "%s" "$2" > /work/keycloak-username
              printf "%s" "$3" > /work/keycloak-password
          volumeMounts:
            - name: db-credentials
              mountPath: /work
          resources:
            requests:
              cpu: "${ARGOCD_ENV_resource_keycloak_db_bootstrap_prepare_requests_cpu}"
              memory: "${ARGOCD_ENV_resource_keycloak_db_bootstrap_prepare_requests_memory}"
            limits:
              cpu: "${ARGOCD_ENV_resource_keycloak_db_bootstrap_prepare_limits_cpu}"
              memory: "${ARGOCD_ENV_resource_keycloak_db_bootstrap_prepare_limits_memory}"
      containers:
        - name: create-database
          image: docker.io/library/mysql:8.4
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -- \
                "$(cat /work/root-password)" \
                "$(cat /work/keycloak-username)" \
                "$(cat /work/keycloak-password)"

              mysql \
                --protocol=TCP \
                --host=mysql-cluster-haproxy.stateful-resources.svc.cluster.local \
                --port=3306 \
                --user=root \
                --password="$1" <<SQL
              CREATE DATABASE IF NOT EXISTS keycloak CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
              CREATE USER IF NOT EXISTS '$2'@'%' IDENTIFIED BY '$3';
              ALTER USER '$2'@'%' IDENTIFIED BY '$3';
              GRANT ALL PRIVILEGES ON keycloak.* TO '$2'@'%';
              FLUSH PRIVILEGES;
              SQL
          volumeMounts:
            - name: db-credentials
              mountPath: /work
          resources:
            requests:
              cpu: "${ARGOCD_ENV_resource_keycloak_db_bootstrap_create_requests_cpu}"
              memory: "${ARGOCD_ENV_resource_keycloak_db_bootstrap_create_requests_memory}"
            limits:
              cpu: "${ARGOCD_ENV_resource_keycloak_db_bootstrap_create_limits_cpu}"
              memory: "${ARGOCD_ENV_resource_keycloak_db_bootstrap_create_limits_memory}"
