apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak-db-bootstrap
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: keycloak-db-bootstrap
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: keycloak-db-bootstrap
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: keycloak-db-bootstrap
subjects:
  - kind: ServiceAccount
    name: keycloak-db-bootstrap
    namespace: keycloak
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: keycloak-db-bootstrap-pxc-secret-reader
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["mysql-cluster-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: keycloak-db-bootstrap-pxc-secret-reader
  annotations:
    argocd.argoproj.io/sync-wave: "5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: keycloak-db-bootstrap-pxc-secret-reader
subjects:
  - kind: ServiceAccount
    name: keycloak-db-bootstrap
    namespace: keycloak
