provider:
  name: aws

env:
  - name: AWS_ACCESS_KEY_ID
    valueFrom:
      secretKeyRef:
        name: route53-credentials-secret
        key: aws_access_key_id
  - name: AWS_SECRET_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: route53-credentials-secret
        key: aws_secret_access_key
  - name: AWS_DEFAULT_REGION
    value: ${ARGOCD_ENV_cert_manager_route53_region}

sources:
  - gateway-httproute

domainFilters:
  - ${ARGOCD_ENV_base_domain}

policy: sync
registry: txt
txtOwnerId: ${ARGOCD_ENV_external_dns_txt_owner_id}
interval: 1m
triggerLoopOnEvent: true
logLevel: info

serviceAccount:
  create: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

securityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
