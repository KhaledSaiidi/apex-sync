        - name: resource_otel_daemonset_limits_memory
          value: "${ARGOCD_ENV_resource_otel_daemonset_limits_memory}"

  destination:
    namespace: observability
    server: https://kubernetes.default.svc
  project: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m0s
        factor: 2
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=background
      - PruneLast=true
