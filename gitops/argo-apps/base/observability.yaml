apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "23"
  name: observability
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  source:
    path: gitops/argo-apps/base/observability
    repoURL: ${ARGOCD_ENV_gitops_root_app_repo_url}
    targetRevision: ${ARGOCD_ENV_gitops_root_app_target_revision}
    plugin:
      name: envsubst
      env:
        - name: gitops_root_app_repo_url
          value: "${ARGOCD_ENV_gitops_root_app_repo_url}"
        - name: gitops_root_app_target_revision
          value: "${ARGOCD_ENV_gitops_root_app_target_revision}"
        - name: base_domain
          value: "${ARGOCD_ENV_base_domain}"
        - name: mimir_version
          value: "${ARGOCD_ENV_mimir_version}"
        - name: loki_version
          value: "${ARGOCD_ENV_loki_version}"
        - name: tempo_version
          value: "${ARGOCD_ENV_tempo_version}"
        - name: prometheus_operator_crds_version
          value: "${ARGOCD_ENV_prometheus_operator_crds_version}"
        - name: prometheus_operator_version
          value: "${ARGOCD_ENV_prometheus_operator_version}"
        - name: grafana_operator_version
          value: "${ARGOCD_ENV_grafana_operator_version}"
        - name: opentelemetry_operator_version
          value: "${ARGOCD_ENV_opentelemetry_operator_version}"
        - name: grafana_operator_replicas
          value: "${ARGOCD_ENV_grafana_operator_replicas}"
        - name: opentelemetry_operator_replicas
          value: "${ARGOCD_ENV_opentelemetry_operator_replicas}"
        - name: resource_prometheus_operator_requests_cpu
          value: "${ARGOCD_ENV_resource_prometheus_operator_requests_cpu}"
        - name: resource_prometheus_operator_requests_memory
          value: "${ARGOCD_ENV_resource_prometheus_operator_requests_memory}"
        - name: resource_prometheus_operator_limits_cpu
          value: "${ARGOCD_ENV_resource_prometheus_operator_limits_cpu}"
        - name: resource_prometheus_operator_limits_memory
          value: "${ARGOCD_ENV_resource_prometheus_operator_limits_memory}"
        - name: resource_prometheus_operator_webhook_patch_requests_cpu
          value: "${ARGOCD_ENV_resource_prometheus_operator_webhook_patch_requests_cpu}"
        - name: resource_prometheus_operator_webhook_patch_requests_memory
          value: "${ARGOCD_ENV_resource_prometheus_operator_webhook_patch_requests_memory}"
        - name: resource_prometheus_operator_webhook_patch_limits_cpu
          value: "${ARGOCD_ENV_resource_prometheus_operator_webhook_patch_limits_cpu}"
        - name: resource_prometheus_operator_webhook_patch_limits_memory
          value: "${ARGOCD_ENV_resource_prometheus_operator_webhook_patch_limits_memory}"
        - name: resource_grafana_operator_requests_cpu
          value: "${ARGOCD_ENV_resource_grafana_operator_requests_cpu}"
        - name: resource_grafana_operator_requests_memory
          value: "${ARGOCD_ENV_resource_grafana_operator_requests_memory}"
        - name: resource_grafana_operator_limits_cpu
          value: "${ARGOCD_ENV_resource_grafana_operator_limits_cpu}"
        - name: resource_grafana_operator_limits_memory
          value: "${ARGOCD_ENV_resource_grafana_operator_limits_memory}"
        - name: resource_opentelemetry_operator_requests_cpu
          value: "${ARGOCD_ENV_resource_opentelemetry_operator_requests_cpu}"
        - name: resource_opentelemetry_operator_requests_memory
          value: "${ARGOCD_ENV_resource_opentelemetry_operator_requests_memory}"
        - name: resource_opentelemetry_operator_limits_cpu
          value: "${ARGOCD_ENV_resource_opentelemetry_operator_limits_cpu}"
        - name: resource_opentelemetry_operator_limits_memory
          value: "${ARGOCD_ENV_resource_opentelemetry_operator_limits_memory}"

  destination:
    namespace: observability
    server: https://kubernetes.default.svc
  project: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m0s
        factor: 2
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=background
      - PruneLast=true
