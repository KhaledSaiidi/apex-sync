apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  name: istio-main-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  source:
    path: gitops/apps/istio/istio-main
    repoURL: ${ARGOCD_ENV_gitops_root_app_repo_url}
    targetRevision: ${ARGOCD_ENV_gitops_root_app_target_revision}
    plugin:
      name: envsubst
      env:
        - name: istio_main_version
          value: "${ARGOCD_ENV_istio_main_version}"
        - name: gateway_api_version
          value: "${ARGOCD_ENV_gateway_api_version}"
        - name: istiod_replicas
          value: "${ARGOCD_ENV_istiod_replicas}"
  destination:
    namespace: istio-system
    server: https://kubernetes.default.svc
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istio-validator-istio-system
      jqPathExpressions:
        - .webhooks[]?.clientConfig.caBundle
        - .webhooks[]?.clientConfig.service.port
        - .webhooks[]?.failurePolicy
        - .webhooks[]?.matchPolicy
        - .webhooks[]?.namespaceSelector
        - .webhooks[]?.objectSelector
        - .webhooks[]?.rules[]?.scope
        - .webhooks[]?.timeoutSeconds
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istiod-default-validator
      jqPathExpressions:
        - .webhooks[]?.clientConfig.caBundle
        - .webhooks[]?.clientConfig.service.port
        - .webhooks[]?.failurePolicy
        - .webhooks[]?.matchPolicy
        - .webhooks[]?.namespaceSelector
        - .webhooks[]?.objectSelector
        - .webhooks[]?.rules[]?.scope
        - .webhooks[]?.timeoutSeconds
  project: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m0s
        factor: 2
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=background
      - PruneLast=true
      - RespectIgnoreDifferences=true
