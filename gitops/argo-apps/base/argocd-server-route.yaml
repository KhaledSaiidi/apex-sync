apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-server-route
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "18"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: ${ARGOCD_ENV_gitops_root_app_repo_url}
    targetRevision: ${ARGOCD_ENV_gitops_root_app_target_revision}
    path: gitops/apps/argocd-server-route
    plugin:
      name: envsubst
      env:
        - name: base_domain
          value: "${ARGOCD_ENV_base_domain}"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m0s
        factor: 2
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=background
      - PruneLast=true
