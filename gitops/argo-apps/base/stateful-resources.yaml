apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stateful-resources
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '20'
  labels:
    app.kubernetes.io/name: stateful-resources
    app.kubernetes.io/part-of: platform-baseline
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: ${ARGOCD_ENV_gitops_root_app_repo_url}
    targetRevision: ${ARGOCD_ENV_gitops_root_app_target_revision}
    path: gitops/apps/stateful-resources
    plugin:
      name: envsubst
      env:
        - name: percona_version
          value: "${ARGOCD_ENV_percona_version}"
        - name: base_domain
          value: "${ARGOCD_ENV_base_domain}"
        - name: stateful_resources_pxc_replicas
          value: "${ARGOCD_ENV_stateful_resources_pxc_replicas}"
        - name: stateful_resources_haproxy_replicas
          value: "${ARGOCD_ENV_stateful_resources_haproxy_replicas}"
        - name: resource_stateful_resources_pxc_requests_cpu
          value: "${ARGOCD_ENV_resource_stateful_resources_pxc_requests_cpu}"
        - name: resource_stateful_resources_pxc_requests_memory
          value: "${ARGOCD_ENV_resource_stateful_resources_pxc_requests_memory}"
        - name: resource_stateful_resources_pxc_limits_cpu
          value: "${ARGOCD_ENV_resource_stateful_resources_pxc_limits_cpu}"
        - name: resource_stateful_resources_pxc_limits_memory
          value: "${ARGOCD_ENV_resource_stateful_resources_pxc_limits_memory}"
        - name: resource_stateful_resources_haproxy_requests_cpu
          value: "${ARGOCD_ENV_resource_stateful_resources_haproxy_requests_cpu}"
        - name: resource_stateful_resources_haproxy_requests_memory
          value: "${ARGOCD_ENV_resource_stateful_resources_haproxy_requests_memory}"
        - name: resource_stateful_resources_haproxy_limits_memory
          value: "${ARGOCD_ENV_resource_stateful_resources_haproxy_limits_memory}"
        - name: resource_stateful_resources_logcollector_requests_cpu
          value: "${ARGOCD_ENV_resource_stateful_resources_logcollector_requests_cpu}"
        - name: resource_stateful_resources_logcollector_requests_memory
          value: "${ARGOCD_ENV_resource_stateful_resources_logcollector_requests_memory}"
        - name: resource_stateful_resources_logcollector_limits_cpu
          value: "${ARGOCD_ENV_resource_stateful_resources_logcollector_limits_cpu}"
        - name: resource_stateful_resources_logcollector_limits_memory
          value: "${ARGOCD_ENV_resource_stateful_resources_logcollector_limits_memory}"
        - name: resource_stateful_resources_backup_pitr_requests_cpu
          value: "${ARGOCD_ENV_resource_stateful_resources_backup_pitr_requests_cpu}"
        - name: resource_stateful_resources_backup_pitr_requests_memory
          value: "${ARGOCD_ENV_resource_stateful_resources_backup_pitr_requests_memory}"
        - name: resource_stateful_resources_backup_pitr_limits_cpu
          value: "${ARGOCD_ENV_resource_stateful_resources_backup_pitr_limits_cpu}"
        - name: resource_stateful_resources_backup_pitr_limits_memory
          value: "${ARGOCD_ENV_resource_stateful_resources_backup_pitr_limits_memory}"
        - name: resource_stateful_resources_backup_full_requests_cpu
          value: "${ARGOCD_ENV_resource_stateful_resources_backup_full_requests_cpu}"
        - name: resource_stateful_resources_backup_full_requests_memory
          value: "${ARGOCD_ENV_resource_stateful_resources_backup_full_requests_memory}"
        - name: resource_stateful_resources_backup_full_limits_cpu
          value: "${ARGOCD_ENV_resource_stateful_resources_backup_full_limits_cpu}"
        - name: resource_stateful_resources_backup_full_limits_memory
          value: "${ARGOCD_ENV_resource_stateful_resources_backup_full_limits_memory}"
  destination:
    server: https://kubernetes.default.svc
    namespace: stateful-resources
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m0s
        factor: 2
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=background
      - PruneLast=true
